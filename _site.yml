name: slogan
author: "Luisa M. Mimmi"
output_dir: "docs" #_site #
exclude: ["*.xls", "*.csv","*.R", "Makefile", "*.bib" ]
output:
  html_document:
    theme: flatly #united
    highlight: tango # pygments
    css: html/fixes.css
    include:
      after_body: html/footer.html
    code_folding: show
    code_download: yes
    toc: yes
    toc_float:
      collapsed: true
      smooth_scroll: yes
    toc_depth: 4
    fig_height: 4
    fig_width: 6
    lib_dir: site_libs
    self_contained: no
new_session: yes
